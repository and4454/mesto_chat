name: Проверка сборки MestoChat

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Установить зависимости
        run: pip install pyqt5 pyinstaller
      - name: Сборка EXE
        run: pyinstaller MestoChat.spec
